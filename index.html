<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="only light">
<title>조선옥 메뉴판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    color-scheme: only light;
    --cream: #F7F2E8;
    --cream-dark: #EDE6D6;
    --brown: #2D1B0E;
    --brown-light: #5C3A1E;
    --gold: #B8860B;
    --gold-light: #DAA520;
    --red: #C0392B;
    --blue: #1A3C6E;
    --green: #2E7D32;
    --yellow: #F4D03F;
    --white-ob: #F5F5F0;
    --card-bg: #FFFDF7;
    --shadow: rgba(45,27,14,0.12);
  }
  html { background: var(--cream); }
  body {
    font-family: 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }
  /* ── 5색 스트라이프 헤더 ── */
  .obangsaek-top {
    display: flex; width: 100%; height: 8px;
  }
  .obangsaek-top span { flex: 1; }
  .obangsaek-top span:nth-child(1) { background: var(--blue); }
  .obangsaek-top span:nth-child(2) { background: var(--red); }
  .obangsaek-top span:nth-child(3) { background: var(--yellow); }
  .obangsaek-top span:nth-child(4) { background: var(--white-ob); }
  .obangsaek-top span:nth-child(5) { background: var(--green); }

  /* ── 헤더 ── */
  .header {
    background: var(--brown);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 3px;
    background: var(--gold);
  }
  .calligraphy-logo {
    height: auto; max-width: 260px; max-height: 72px;
    display: block; margin: 0 auto 8px; object-fit: contain;
    filter: invert(1);
  }
  .subtitle {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px; color: var(--gold-light);
    letter-spacing: 2px; margin-top: 4px;
  }

  /* ── 금색 장식 바 ── */
  .gold-divider {
    display: flex; align-items: center; justify-content: center;
    padding: 18px 20px; gap: 12px;
  }
  .gold-divider::before, .gold-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .gold-divider span {
    font-family: 'Playfair Display', serif;
    font-size: 14px; color: var(--gold);
    white-space: nowrap;
  }

  /* ── 언어 선택 ── */
  .lang-bar {
    display: flex; justify-content: center; gap: 6px;
    padding: 10px 20px 16px;
  }
  .lang-btn {
    border: 1.5px solid var(--gold);
    background: transparent; color: var(--brown-light);
    padding: 5px 16px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    font-family: inherit;
  }
  .lang-btn.active {
    background: var(--gold); color: #fff;
    font-weight: 700;
  }

  /* ── 섹션 타이틀 ── */
  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 700;
    text-align: center; padding: 12px 20px 16px;
    color: var(--brown);
    letter-spacing: 1px;
  }

  /* ── 메뉴 그리드 ── */
  .menu-container { padding: 0 16px 24px; }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 720px;
    margin: 0 auto;
  }
  @media (max-width: 540px) {
    .menu-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }

  /* ── 메뉴 카드 ── */
  .menu-card {
    background: var(--card-bg);
    border: 1px solid var(--cream-dark);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .menu-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--shadow);
  }
  .menu-card:active { transform: scale(0.97); }
  .card-img-wrap {
    width: 100%; aspect-ratio: 4/3;
    background: var(--cream-dark);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .card-img-placeholder {
    font-size: 28px; color: var(--brown-light); opacity: .3;
  }
  .card-body { padding: 10px; text-align: center; }
  .card-name-ko {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px; font-weight: 700;
    line-height: 1.3; color: var(--brown);
  }
  .card-name-sub {
    font-size: 10.5px; color: var(--brown-light);
    margin-top: 2px; line-height: 1.3;
    min-height: 14px;
  }
  .card-price {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700;
    color: var(--gold); margin-top: 6px;
  }

  /* ── 팝업 오버레이 ── */
  .popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    display: none; align-items: flex-end; justify-content: center;
    padding: 20px;
  }
  .popup-overlay.active { display: flex; }
  .popup-card {
    background: var(--card-bg);
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 400px;
    max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 -4px 30px rgba(0,0,0,0.2);
  }
  .popup-overlay.active .popup-card { transform: translateY(0); }
  .popup-close {
    position: absolute; top: 12px; right: 14px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.4); border: none;
    border-radius: 50%; color: #fff; font-size: 18px;
    cursor: pointer; z-index: 2;
    display: flex; align-items: center; justify-content: center;
  }
  .popup-img {
    width: 100%; aspect-ratio: 3/1;
    background: var(--cream-dark);
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .popup-img img { width: 100%; height: 100%; object-fit: cover; }
  .popup-img-placeholder { font-size: 48px; color: var(--brown-light); opacity: .3; }
  .popup-body { padding: 20px; }
  .popup-name-ko {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px; font-weight: 700;
    color: var(--brown);
  }
  .popup-price {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--gold);
    margin: 8px 0 14px;
  }
  .popup-desc {
    border-top: 1px solid var(--cream-dark);
    padding-top: 14px;
  }
  .popup-desc-item {
    margin-bottom: 10px;
  }
  .popup-desc-label {
    font-size: 11px; font-weight: 700;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 2px;
  }
  .popup-desc-text {
    font-size: 13px; line-height: 1.6;
    color: var(--brown-light);
  }

  /* ── 푸터 ── */
  .footer {
    text-align: center; padding: 20px;
    font-size: 11px; color: var(--brown-light);
    border-top: 1px solid var(--cream-dark);
    margin-top: 12px;
  }

  /* ── 로딩 ── */
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--brown-light); font-size: 14px;
  }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--cream-dark);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<!-- 5색 스트라이프 -->
<div class="obangsaek-top"><span></span><span></span><span></span><span></span><span></span></div>

<!-- 헤더 -->
<div class="header">
  <img class="calligraphy-logo" id="logo" alt="조선옥" src="">
  <div class="subtitle" id="subtitle"></div>
</div>

<!-- 언어 선택 -->
<div class="gold-divider"><span>✦ MENU ✦</span></div>
<div class="lang-bar">
  <button class="lang-btn active" data-lang="ko">한국어</button>
  <button class="lang-btn" data-lang="en">English</button>
  <button class="lang-btn" data-lang="zh">中文</button>
  <button class="lang-btn" data-lang="ja">日本語</button>
</div>

<!-- 메뉴 컨텐츠 -->
<div id="menu-content">
  <div class="loading">
    <div class="loading-spinner"></div>
    메뉴를 불러오는 중...
  </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay" id="popup">
  <div class="popup-card">
    <button class="popup-close" id="popup-close">✕</button>
    <div class="popup-img" id="popup-img"></div>
    <div class="popup-body">
      <div class="popup-name-ko" id="popup-name"></div>
      <div class="popup-price" id="popup-price"></div>
      <div class="popup-desc" id="popup-desc"></div>
    </div>
  </div>
</div>

<!-- 푸터 -->
<div class="footer" id="footer"></div>

<!-- 5색 하단 -->
<div class="obangsaek-top"><span></span><span></span><span></span><span></span><span></span></div>

<script>
(function() {
  let menuData = null;
  let currentLang = 'ko';

  const LANG_LABELS = { ko: '한국어', en: 'English', zh: '中文', ja: '日本語' };
  const LANG_ORDER = ['ko', 'en', 'zh', 'ja'];

  // ── 데이터 로드 ──
  async function loadMenuData() {
    try {
      const res = await fetch('menu-data.json');
      if (!res.ok) throw new Error('Failed to load');
      menuData = await res.json();
      initPage();
    } catch (e) {
      document.getElementById('menu-content').innerHTML =
        '<div class="loading" style="color:var(--red)">메뉴 데이터를 불러올 수 없습니다.</div>';
      console.error(e);
    }
  }

  // ── 페이지 초기화 ──
  function initPage() {
    const r = menuData.restaurant;

    // 로고: 같은 폴더의 이미지 또는 base64
    const logo = document.getElementById('logo');
    if (r.logo) {
      logo.src = r.logo;
      logo.onerror = () => { logo.style.display = 'none'; };
    }

    document.getElementById('subtitle').textContent = r.subtitle || '';
    renderMenu();
    updateFooter();
  }

  // ── 메뉴 렌더링 ──
  function renderMenu() {
    if (!menuData) return;
    const container = document.getElementById('menu-content');
    let html = '';

    menuData.categories.forEach(cat => {
      const title = cat.title[currentLang] || cat.title.ko;
      html += '<div class="section-title">' + escHtml(title) + '</div>';
      html += '<div class="menu-container"><div class="menu-grid">';

      cat.items.forEach((item, idx) => {
        const nameKo = item.name.ko;
        const nameSub = currentLang !== 'ko' ? (item.name[currentLang] || '') : '';
        const price = formatPrice(item.price);
        const imgSrc = item.image || '';

        html += '<div class="menu-card" data-cat="' + cat.id + '" data-idx="' + idx + '">';
        html += '<div class="card-img-wrap">';
        if (imgSrc) {
          html += '<img src="' + escHtml(imgSrc) + '" alt="' + escHtml(nameKo) + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=card-img-placeholder>🍽</div>\'">';
        } else {
          html += '<div class="card-img-placeholder">🍽</div>';
        }
        html += '</div>';
        html += '<div class="card-body">';
        html += '<div class="card-name-ko">' + escHtml(nameKo) + '</div>';
        html += '<div class="card-name-sub">' + escHtml(nameSub) + '</div>';
        html += '<div class="card-price">' + price + '</div>';
        html += '</div></div>';
      });

      html += '</div></div>';
    });

    container.innerHTML = html;

    // 카드 클릭 이벤트
    container.querySelectorAll('.menu-card').forEach(card => {
      card.addEventListener('click', () => {
        const catId = card.dataset.cat;
        const idx = parseInt(card.dataset.idx);
        const cat = menuData.categories.find(c => c.id === catId);
        if (cat) openPopup(cat.items[idx]);
      });
    });
  }

  // ── 팝업 ──
  function openPopup(item) {
    const popup = document.getElementById('popup');
    const imgWrap = document.getElementById('popup-img');
    const imgSrc = item.image || '';

    if (imgSrc) {
      imgWrap.innerHTML = '<img src="' + escHtml(imgSrc) + '" alt="" onerror="this.parentElement.innerHTML=\'<div class=popup-img-placeholder>🍽</div>\'">';
    } else {
      imgWrap.innerHTML = '<div class="popup-img-placeholder">🍽</div>';
    }

    document.getElementById('popup-name').textContent = item.name.ko;
    document.getElementById('popup-price').textContent = formatPrice(item.price);

    // 설명: 4개 국어
    let descHtml = '';
    LANG_ORDER.forEach(lang => {
      const desc = item.description?.[lang];
      if (desc) {
        descHtml += '<div class="popup-desc-item">';
        descHtml += '<div class="popup-desc-label">' + LANG_LABELS[lang] + '</div>';
        descHtml += '<div class="popup-desc-text">' + escHtml(desc) + '</div>';
        descHtml += '</div>';
      }
    });
    document.getElementById('popup-desc').innerHTML = descHtml;

    popup.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closePopup() {
    const popup = document.getElementById('popup');
    popup.querySelector('.popup-card').style.transform = 'translateY(100%)';
    setTimeout(() => {
      popup.classList.remove('active');
      popup.querySelector('.popup-card').style.transform = '';
      document.body.style.overflow = '';
    }, 300);
  }

  // ── 언어 전환 ──
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      renderMenu();
      updateFooter();
    });
  });

  // ── 팝업 닫기 ──
  document.getElementById('popup-close').addEventListener('click', closePopup);
  document.getElementById('popup').addEventListener('click', e => {
    if (e.target === e.currentTarget) closePopup();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePopup();
  });

  // ── 푸터 ──
  function updateFooter() {
    const footerText = {
      ko: '전주 한옥마을 · 조선옥',
      en: 'Jeonju Hanok Village · Joseonok',
      zh: '全州韩屋村 · 朝鲜屋',
      ja: '全州韓屋村 · 朝鮮屋'
    };
    document.getElementById('footer').textContent = footerText[currentLang] || footerText.ko;
  }

  // ── 유틸 ──
  function formatPrice(n) {
    return n.toLocaleString() + '원';
  }
  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── 시작 ──
  loadMenuData();
})();
</script>
</body>
</html>
